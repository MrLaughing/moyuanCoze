name: Android Build & APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'
          cache-disabled: true

      - name: Build Debug APK
        run: gradle clean assembleDebug

      - name: Build Release APK
        run: gradle assembleRelease
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: moyuan-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: moyuan-release
          path: app/build/outputs/apk/release/*.apk

      # ─── GitHub Release ───
      - name: Update Debug Release (GitHub)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.0-debug
          name: "墨园 v0.1.0 Debug Build"
          prerelease: true
          body: |
            Latest debug build from commit ${{ github.sha }}

            - Auto-built from push to main
          files: app/build/outputs/apk/debug/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Release APK (GitHub)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.0-release
          name: "墨园 v0.1.0 Release Build"
          prerelease: true
          body: |
            Latest release build from commit ${{ github.sha }}

            - Auto-built from push to main
          files: app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ─── Gitee 同步 ───
      - name: Sync Release APK to Gitee
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          set -e
          
          GITEE_REPO="${{ secrets.GITEE_REPO }}"
          GITEE_TOKEN="${{ secrets.GITEE_TOKEN }}"
          
          # 检查是否配置了 Gitee 密钥
          if [ -z "$GITEE_REPO" ] || [ -z "$GITEE_TOKEN" ]; then
            echo "⚠️ Gitee secrets not configured, skipping sync"
            echo "Please set GITEE_REPO and GITEE_TOKEN in repository secrets"
            exit 0
          fi
          
          # 找到 Release APK
          APK_FILE=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -z "$APK_FILE" ]; then
            echo "❌ No release APK found"
            exit 1
          fi
          APK_NAME=$(basename "$APK_FILE")
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "📦 Uploading: $APK_NAME (commit $SHORT_SHA)"
          
          # 删除旧 Release（如果存在）
          OLD_RELEASE_ID=$(curl -s "https://gitee.com/api/v5/repos/$GITEE_REPO/releases/tags/v0.1.0-release" \
            -H "Content-Type: application/json" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id',''))" 2>/dev/null || echo "")
          
          if [ -n "$OLD_RELEASE_ID" ]; then
            echo "🗑️ Deleting old release: $OLD_RELEASE_ID"
            curl -s -X DELETE "https://gitee.com/api/v5/repos/$GITEE_REPO/releases/$OLD_RELEASE_ID" \
              -H "Content-Type: application/json" \
              -d "{\"access_token\": \"$GITEE_TOKEN\"}" > /dev/null
            sleep 2
          fi
          
          # 删除旧 Tag
          curl -s -X DELETE "https://gitee.com/api/v5/repos/$GITEE_REPO/tags/v0.1.0-release" \
            -d "{\"access_token\": \"$GITEE_TOKEN\"}" > /dev/null 2>&1
          
          # 创建新 Tag
          curl -s -X POST "https://gitee.com/api/v5/repos/$GITEE_REPO/tags" \
            -H "Content-Type: application/json" \
            -d "{
              \"access_token\": \"$GITEE_TOKEN\",
              \"tag_name\": \"v0.1.0-release\",
              \"refs\": \"main\",
              \"message\": \"Auto build $SHORT_SHA\"
            }" > /dev/null
          sleep 1
          
          # 创建 Release
          CREATE_RESP=$(curl -s -X POST "https://gitee.com/api/v5/repos/$GITEE_REPO/releases" \
            -H "Content-Type: application/json" \
            -d "{
              \"access_token\": \"$GITEE_TOKEN\",
              \"tag_name\": \"v0.1.0-release\",
              \"name\": \"墨园 v0.1.0 Release Build\",
              \"body\": \"最新自动构建 (commit $SHORT_SHA)\\n\\n国内加速下载，无需代理\",
              \"prerelease\": true,
              \"target_commitish\": \"main\"
            }")
          
          RELEASE_ID=$(echo "$CREATE_RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))" 2>/dev/null || echo "")
          
          if [ -z "$RELEASE_ID" ]; then
            echo "❌ Failed to create Gitee release"
            echo "$CREATE_RESP"
            exit 1
          fi
          echo "✅ Created Gitee release: $RELEASE_ID"
          
          # 上传 APK 附件
          UPLOAD_RESP=$(curl -s -X POST \
            "https://gitee.com/api/v5/repos/$GITEE_REPO/releases/$RELEASE_ID/attach_files" \
            -F "access_token=$GITEE_TOKEN" \
            -F "file=@$APK_FILE")
          
          FILE_NAME=$(echo "$UPLOAD_RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('name','FAILED'))" 2>/dev/null || echo "FAILED")
          
          if [ "$FILE_NAME" = "FAILED" ]; then
            echo "❌ Failed to upload APK to Gitee"
            echo "$UPLOAD_RESP"
            exit 1
          fi
          
          echo "🎉 Successfully synced to Gitee!"
          echo "📥 Download: https://gitee.com/$GITEE_REPO/releases/v0.1.0-release"
